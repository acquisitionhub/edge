<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edge Tracker Global Pro</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --blue: #58a6ff; --green: #3fb950; --red: #f85149; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 40px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; text-align: center; }
        .symbol { font-weight: bold; font-size: 1.2em; color: var(--blue); }
        .pips { font-size: 2.5em; font-weight: 800; margin: 10px 0; }
        .prob-bar { height: 4px; background: #333; border-radius: 2px; margin-top: 10px; overflow: hidden; }
        .prob-fill { height: 100%; transition: 0.5s; }

        /* Table */
        .matrix-container { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border: 1px solid var(--border); text-align: center; font-size: 0.9em; }
        .pos { color: var(--green); } .neg { color: var(--red); }
        h2 { font-size: 1.1em; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; margin-bottom: 30px;">GLOBAL EDGE MONITOR</h1>
        
        <div class="grid" id="asset-grid">
            </div>

        <div class="matrix-container">
            <h2>Correlation Matrix (Intraday)</h2>
            <table id="corr-table"></table>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            const res = await fetch('/api/full-data');
            const data = await res.json();
            
            // Update Asset Cards
            const grid = document.getElementById('asset-grid');
            grid.innerHTML = data.assets.map(a => {
                const color = a.pips >= 0 ? 'var(--green)' : 'var(--red)';
                const probColor = a.prob > 70 ? 'var(--green)' : a.prob > 40 ? 'orange' : 'var(--red)';
                return `
                    <div class="card">
                        <div class="symbol">${a.symbol}</div>
                        <div class="pips" style="color:${color}">${a.pips > 0 ? '+' : ''}${a.pips}</div>
                        <div style="font-size: 0.8em; color: #8b949e;">RTO Prob: ${a.prob}%</div>
                        <div class="prob-bar"><div class="prob-fill" style="width:${a.prob}%; background:${probColor}"></div></div>
                    </div>
                `;
            }).join('');

            // Update Correlation Table
            const table = document.getElementById('corr-table');
            const symbols = Object.keys(data.correlation);
            let html = `<tr><th></th>${symbols.map(s => `<th>${s}</th>`).join('')}</tr>`;
            
            symbols.forEach(s1 => {
                html += `<tr><td style="font-weight:bold">${s1}</td>`;
                symbols.forEach(s2 => {
                    const val = data.correlation[s1][s2];
                    const cls = val > 0.6 ? 'pos' : val < -0.6 ? 'neg' : '';
                    html += `<td class="${cls}">${val.toFixed(2)}</td>`;
                });
                html += '</tr>';
            });
            table.innerHTML = html;
        }

        setInterval(updateDashboard, 60000);
        updateDashboard();
    </script>
</body>
</html>
