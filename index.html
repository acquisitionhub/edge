<!DOCTYPE html>
<html>
<head>
    <title>Edge Tracker Global</title>
    <style>
        :root { --bg: #0a0b10; --card: #161b22; --green: #00ff88; --red: #ff4b5c; --blue: #00d4ff; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 40px; }
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; max-width: 1200px; margin: 0 auto; 
        }
        .asset-card { 
            background: var(--card); border-radius: 16px; padding: 20px; 
            border: 1px solid #30363d; transition: 0.3s;
        }
        .asset-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .symbol { font-size: 20px; font-weight: bold; color: var(--blue); }
        .prob-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .pip-main { font-size: 36px; font-weight: 800; margin: 10px 0; }
        .sub-data { font-size: 13px; color: #8b949e; display: flex; justify-content: space-between; }
        
        /* Dynamic Colors */
        .high-prob { background: rgba(0, 255, 136, 0.1); color: var(--green); }
        .low-prob { background: rgba(255, 75, 92, 0.1); color: var(--red); }
        .pos { color: var(--green); }
        .neg { color: var(--red); }
    </style>
</head>
<body>
    <h1 style="text-align:center; margin-bottom:40px; letter-spacing:3px;">MULTI-ASSET EDGE <span style="font-weight:100">MONITOR</span></h1>
    
    <div class="dashboard-grid" id="tracker">
        </div>

    <script>
        async function refreshTracker() {
            const res = await fetch('/api/multi-stats');
            const data = await res.json();
            const container = document.getElementById('tracker');
            container.innerHTML = '';

            data.forEach(item => {
                const probClass = item.prob > 60 ? 'high-prob' : 'low-prob';
                const pipClass = item.pips >= 0 ? 'pos' : 'neg';
                
                container.innerHTML += `
                    <div class="asset-card">
                        <div class="asset-header">
                            <span class="symbol">${item.symbol}</span>
                            <span class="prob-badge ${probClass}">RTO: ${item.prob}%</span>
                        </div>
                        <div class="pip-main ${pipClass}">${item.pips > 0 ? '+' : ''}${item.pips}</div>
                        <div class="sub-data">
                            <span>Price: ${item.current}</span>
                            <span>Open: ${item.open}</span>
                        </div>
                    </div>
                `;
            });
        }
        setInterval(refreshTracker, 60000);
        refreshTracker();
    </script>
</body>
</html>
